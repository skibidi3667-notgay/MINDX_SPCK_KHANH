<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Áo Thun Basic</title>

    <link rel="stylesheet" href="details.css">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

<div class="image-box">
    <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=900">
</div>

<div class="info">

    <h1>Áo Thun Basic</h1>

    <div class="price">399.000đ</div>

    <p>
        Áo thun basic phong cách tối giản, chất liệu cotton cao cấp,
        thoáng mát và phù hợp sử dụng hằng ngày.
    </p>

    <div class="product-option">

        <label>Chất liệu</label>
        <input type="text" value="Cotton cao cấp" readonly>

        <label>Chọn màu sắc</label>
        <select>
            <option>Đen</option>
            <option>Trắng</option>
            <option>Be</option>
            <option>Xám</option>
        </select>

        <label>Chọn kích cỡ</label>
        <select>
            <option>S</option>
            <option>M</option>
            <option>L</option>
            <option>XL</option>
        </select>

        <label>Số lượng</label>
        <input type="number" value="1" min="1">

    </div>

    <div class="buttons">
        <button>Mua ngay</button>
        <a href="../products/products.html">Quay lại</a>
    </div>

</div>
</div>

</body>
</html>
