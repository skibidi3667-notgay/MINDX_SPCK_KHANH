<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đầm Thời Trang</title>

    <link rel="stylesheet" href="details.css">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

<div class="image-box">
    <img src="https://images.unsplash.com/photo-1496747611176-843222e1e57c?w=900">
</div>

<div class="info">

    <h1>Đầm Thời Trang</h1>

    <div class="price">699.000đ</div>

    <p>
        Đầm nữ thiết kế hiện đại, thanh lịch,
        phù hợp đi tiệc, dạo phố hoặc chụp ảnh.
    </p>

    <div class="product-option">

        <label>Chất liệu</label>
        <input type="text" value="Lụa cao cấp" readonly>

        <label>Chọn màu sắc</label>
        <select>
            <option>Hồng</option>
            <option>Trắng</option>
            <option>Đen</option>
        </select>

        <label>Chọn kích cỡ</label>
        <select>
            <option>S</option>
            <option>M</option>
            <option>L</option>
        </select>

        <label>Số lượng</label>
        <input type="number" value="1" min="1">

    </div>

    <div class="buttons">
        <button>Mua ngay</button>
        <a href="../products/products.html">Quay lại</a>
    </div>

</div>
</div>

</body>
</html>
