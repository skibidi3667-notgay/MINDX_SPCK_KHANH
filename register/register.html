<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký | KHANH FASHION</title>
  <link rel="stylesheet" href="register.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="form-box">
      <h1>KHANH</h1>
      <p class="subtitle">Fashion Store</p>
      <h2>Tạo tài khoản</h2>

      <form id="registerForm">
        <div class="input-box">
          <input type="text" id="fullname" placeholder="Họ và tên" required>
        </div>
        <div class="input-box">
          <input type="email" id="email" placeholder="Email" required>
        </div>
        <div class="input-box">
          <input type="password" id="password" placeholder="Mật khẩu" minlength="6" required>
        </div>
        <div class="input-box">
          <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu" minlength="6" required>
        </div>
        <button type="submit">Đăng ký</button>
      </form>

      <p class="switch">
        Đã có tài khoản?
        <a href="../login/login.html">Đăng nhập</a>
      </p>
    </div>
  </div>

  <script src="register.js"></script>
</body>
</html>
